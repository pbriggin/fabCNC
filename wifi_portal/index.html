<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fabCNC — WiFi Setup</title>
  <style>
    :root {
      --bg-primary:    #1e1e1e;
      --bg-secondary:  #252525;
      --bg-elevated:   #2d2d2d;
      --bg-card:       #333333;
      --border:        #404040;
      --border-light:  #4a4a4a;
      --text-primary:  #e0e0e0;
      --text-secondary:#9e9e9e;
      --accent-blue:   #4a9eff;
      --accent-green:  #4caf50;
      --accent-red:    #f44336;
      --logo-blue:     #5b9bd5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(180deg, #2a2a2a 0%, #252525 100%);
      border-bottom: 1px solid var(--border);
      height: 48px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    header .subtitle {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-left: auto;
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }

    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Network list ── */
    #network-list { list-style: none; }

    .network-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
      user-select: none;
    }

    .network-item:last-child { border-bottom: none; }
    .network-item:hover      { background: var(--bg-elevated); }
    .network-item:active     { background: var(--border); }
    .network-item.selected   { background: rgba(74,158,255,0.12); }

    /* Signal icon — 4 bars */
    .signal-icon {
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 18px;
    }

    .signal-bar {
      width: 4px;
      border-radius: 1px;
      background: var(--border-light);
    }

    .signal-bar.active { background: var(--accent-blue); }

    .network-name {
      flex: 1;
      font-size: 0.95rem;
    }

    .network-lock {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* ── Connect form ── */
    #connect-form {
      padding: 20px;
      border-top: 1px solid var(--border);
      display: none;
    }

    #connect-form.visible { display: block; }

    .ssid-display {
      font-size: 1rem;
      font-weight: 500;
      color: var(--accent-blue);
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.95rem;
      padding: 10px 48px 10px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--accent-blue); }

    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      padding: 4px 2px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .toggle-pw:hover { color: var(--text-primary); }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-primary {
      background: var(--accent-blue);
      color: #fff;
    }

    .btn-primary:hover    { background: #5aaeff; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      width: auto;
      padding: 6px 20px;
    }

    .btn-ghost:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    /* ── Status bar ── */
    .status-bar {
      padding: 12px 20px;
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
      display: none;
      align-items: center;
      gap: 8px;
    }

    .status-bar.visible { display: flex; }
    .status-bar.error   { color: var(--accent-red); }
    .status-bar.success { color: var(--accent-green); }
    .status-bar.info    { color: var(--text-secondary); }

    /* ── Spinner ── */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Placeholder (loading / empty) ── */
    .placeholder {
      padding: 36px 20px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
  </style>
</head>
<body>

<header>
  <!-- fabCNC logo — same SVG as app favicon -->
  <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path fill="#5b9bd5" fill-rule="evenodd"
      d="M50 0a50 50 0 1 1 0 100A50 50 0 0 1 50 0zm0 35a15 15 0 1 0 0 30 15 15 0 0 0 0-30z"/>
  </svg>
  <h1>fabCNC</h1>
  <span class="subtitle">WiFi Setup</span>
</header>

<main>
  <div class="card">

    <div class="card-header">
      <div class="card-title">Select a Network</div>
    </div>

    <ul id="network-list">
      <li>
        <div class="placeholder">
          <div class="spinner"></div>
          <span>Scanning for networks…</span>
        </div>
      </li>
    </ul>

    <div id="connect-form">
      <div class="ssid-display" id="selected-ssid"></div>

      <div id="password-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password"
            placeholder="Enter WiFi password"
            autocomplete="off" autocorrect="off"
            autocapitalize="none" spellcheck="false">
          <button type="button" class="toggle-pw" onclick="togglePassword()">Show</button>
        </div>
      </div>

      <button class="btn btn-primary" id="connect-btn" onclick="submitConnect()">Connect</button>
    </div>

    <div class="status-bar" id="status-bar"></div>

  </div>
</main>

<script>
  var selectedSSID = '';
  var selectedSecured = false;

  // ── Signal bars ────────────────────────────────────────────────────────────
  function signalLevel(signal) {
    if (signal <= 0 && signal >= -100) {
      // dBm
      if (signal >= -50) return 4;
      if (signal >= -65) return 3;
      if (signal >= -75) return 2;
      if (signal >= -85) return 1;
      return 0;
    } else {
      // Percentage 0–100
      if (signal >= 75) return 4;
      if (signal >= 50) return 3;
      if (signal >= 25) return 2;
      if (signal > 0)   return 1;
      return 0;
    }
  }

  function renderSignal(signal) {
    var level = signalLevel(signal);
    var heights = [5, 8, 12, 16];
    return heights.map(function(h, i) {
      return '<div class="signal-bar' + (i < level ? ' active' : '') +
             '" style="height:' + h + 'px"></div>';
    }).join('');
  }

  // ── HTML escaping ──────────────────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Render network list ────────────────────────────────────────────────────
  function renderNetworks(networks) {
    var list = document.getElementById('network-list');

    if (!networks || networks.length === 0) {
      list.innerHTML =
        '<li><div class="placeholder">' +
          '<span>No networks found.</span>' +
          '<button class="btn btn-ghost" onclick="loadNetworks()">Retry</button>' +
        '</div></li>';
      return;
    }

    list.innerHTML = networks.map(function(n) {
      var secured = n.security && n.security.length > 0 &&
                    n.security.indexOf('none') === -1;
      return '<li class="network-item" ' +
               'onclick="selectNetwork(' + JSON.stringify(n.ssid) + ',' + secured + ',this)">' +
               '<div class="signal-icon">' + renderSignal(n.signal) + '</div>' +
               '<span class="network-name">' + esc(n.ssid) + '</span>' +
               '<span class="network-lock">' + (secured ? '&#128274;' : '') + '</span>' +
             '</li>';
    }).join('');
  }

  // ── XHR helper ────────────────────────────────────────────────────────────
  // Use RELATIVE URLs so requests work in both Safari (same-origin to
  // 192.168.42.1) and the macOS Captive Network Assistant (where the page
  // origin is captive.apple.com, but wifi-connect's DNS redirects ALL
  // hostnames on the AP to 192.168.42.1 — so relative paths reach the Pi).

  function xhr(method, url, body, onSuccess, onError) {
    var req = new XMLHttpRequest();
    req.open(method, url, true);
    if (body) req.setRequestHeader('Content-Type', 'application/json');
    req.onreadystatechange = function() {
      if (req.readyState !== 4) return;
      if (req.status >= 200 && req.status < 300) {
        onSuccess(req.responseText);
      } else {
        onError(new Error(req.responseText || 'HTTP ' + req.status));
      }
    };
    req.onerror = function() { onError(new Error('Network error')); };
    req.send(body ? JSON.stringify(body) : null);
  }

  // ── Load networks from API ─────────────────────────────────────────────────
  function loadNetworks() {
    var list = document.getElementById('network-list');
    list.innerHTML =
      '<li><div class="placeholder">' +
        '<div class="spinner"></div>' +
        '<span>Scanning for networks…</span>' +
      '</div></li>';
    hideForm();
    hideStatus();

    xhr('GET', '/v1/networks', null, function(text) {
      try { renderNetworks(JSON.parse(text)); }
      catch(e) { renderNetworks([]); }
    }, function(err) {
      list.innerHTML =
        '<li><div class="placeholder">' +
          '<span style="color:var(--accent-red)">Could not reach device.<br>' +
          '<small style="color:var(--text-secondary)">' + esc(err.message) + '</small><br><br>' +
          'Make sure you are connected to <strong>fabCNC Setup</strong> and reload.</span>' +
          '<button class="btn btn-ghost" onclick="loadNetworks()">Retry</button>' +
        '</div></li>';
    });
  }

  // ── Select a network ───────────────────────────────────────────────────────
  function selectNetwork(ssid, secured, el) {
    selectedSSID    = ssid;
    selectedSecured = secured;

    document.querySelectorAll('.network-item').forEach(function(item) {
      item.classList.remove('selected');
    });
    el.classList.add('selected');

    document.getElementById('selected-ssid').textContent = ssid;
    document.getElementById('password').value = '';
    document.getElementById('password-group').style.display = secured ? 'block' : 'none';

    hideStatus();
    showForm();
    if (secured) document.getElementById('password').focus();
  }

  // ── Form visibility ────────────────────────────────────────────────────────
  function showForm() {
    document.getElementById('connect-form').classList.add('visible');
  }

  function hideForm() {
    document.getElementById('connect-form').classList.remove('visible');
  }

  // ── Status bar ─────────────────────────────────────────────────────────────
  function showStatus(html, type) {
    var bar = document.getElementById('status-bar');
    bar.className = 'status-bar visible ' + type;
    bar.innerHTML = (type === 'info')
      ? '<div class="spinner"></div><span>' + html + '</span>'
      : '<span>' + html + '</span>';
  }

  function hideStatus() {
    document.getElementById('status-bar').className = 'status-bar';
  }

  // ── Password visibility toggle ─────────────────────────────────────────────
  function togglePassword() {
    var input = document.getElementById('password');
    var btn   = document.querySelector('.toggle-pw');
    if (input.type === 'password') {
      input.type  = 'text';
      btn.textContent = 'Hide';
    } else {
      input.type  = 'password';
      btn.textContent = 'Show';
    }
  }

  // ── Submit ─────────────────────────────────────────────────────────────────
  function submitConnect() {
    var passphrase = document.getElementById('password').value;

    if (selectedSecured && passphrase.length < 8) {
      showStatus('Password must be at least 8 characters.', 'error');
      return;
    }

    var btn = document.getElementById('connect-btn');
    btn.disabled = true;
    showStatus('Connecting…', 'info');

    xhr('POST', '/v1/connect', { ssid: selectedSSID, passphrase: passphrase },
      function() {
        showStatus('Connected! The device is joining your network. You can close this page.', 'success');
        hideForm();
      },
      function(err) {
        // If the AP shuts down mid-request it counts as success
        if (err.message === 'Network error') {
          showStatus('Connected! The device is joining your network.', 'success');
          hideForm();
        } else {
          showStatus(esc(err.message), 'error');
          btn.disabled = false;
        }
      }
    );
  }

  // Enter key submits
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && selectedSSID) submitConnect();
  });

  // Start
  loadNetworks();
</script>
</body>
</html>
